<div class="backdrop" (click)="onClose()"></div>
<dialog open>
  <h2>Add Task</h2>
  <form (ngSubmit)="onSubmit()"> 
    <!-- Angular form submitting event handler -->
    <p>
      <label for="title">Title</label>
      <input type="text" id="title" name="title"  [(ngModel)]="enteredTask.title" />
      <!-- 2-way binding <<[()]>> in conjunction with NgForms, 
       here, [(ngModel)] is used to bind the form field to a value in the component -->
    </p>

    <p>
      <label for="summary">Summary</label>
      <textarea id="summary" rows="5" name="summary"  [(ngModel)]="enteredTask.summary"></textarea>
    </p>

    <p>
      <label for="due-date">Due Date</label>
      <input type="date" id="due-date" name="due-date"  [(ngModel)]="enteredTask.date"/>
    </p>

    <p class="actions">
      <button type="button" (click)="onClose()">Cancel</button>
      <button type="submit" >Create</button>
    </p>
  </form>
</dialog>
