spring.application.name=api-gateway
server.port=8082
eureka.client.service-url.defaultZone=http://localhost:8010/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=users-status-check-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://users-ws
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/users-ws/users
spring.cloud.gateway.server.webmvc.routes[0].predicates[1]=Method=GET, POST
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.server.webmvc.routes[0].filters[1]=RewritePath=/users-ws/(?<segment>.*), /$\{segment}

