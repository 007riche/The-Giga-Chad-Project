<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title> [[${pageTitle}]] | MySQL CRUD WEB App</title>
  <link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" >
</head>
<body>
<div class="container-fluid text-center">
  <h2>Register an new user</h2>

  <form th:action="@{/users/save}" method="post" th:object="${user}" style="max-width: 500px; margin: 0 auto;">
       <input type="hidden" th:field="*{id}">
    <div class="border">
      <div class="form-group row rounded p-3">
        <label class="col-sm-4 col-form-label">E-mail:</label>
        <div class="col-sm-8">
          <input type="email" name="email" th:field="*{email}" class="form-control" required minlength="8" maxlength="45">
        </div>
      </div>
      <div class="form-group row rounded p-3">
        <label class="col-sm-4 col-form-label">First Name:</label>
        <div class="col-sm-8">
          <input type="text" name="firstName" th:field="*{firstName}" class="form-control" required minlength="2" maxlength="45">
        </div>
      </div>
      <div class="form-group row rounded p-3">
        <label class="col-sm-4 col-form-label">Last Name:</label>
        <div class="col-sm-8">
          <input type="text" name="lastName" th:field="*{lastName}" class="form-control" required minlength="2" maxlength="45">
        </div>
      </div>
      <div class="form-group row rounded p-3">
        <label class="col-sm-4 col-form-label">Password:</label>
        <div class="col-sm-8">
          <input type="password" name="password" th:field="*{password}" class="form-control" required minlength="8" maxlength="15">
        </div>
      </div>
      <div class="form-group row rounded p-3">
        <label class="col-sm-4 col-form-label">Enable:</label>
        <div class="col-sm-7">
          <input type="checkbox" name="enabled" th:field="*{enabled}" class="form-control">
        </div>
      </div>

      <div class="text-center">
        <button type="button" class="btn  btn-outline-secondary m-2" onclick="cancelForm()">Cancel</button>
        <button type="submit" class="btn btn-primary m-2">Save</button>
      </div>
    </div>
  </form>

</div>

<script type="text/javascript">
  function cancelForm() {
    window.location = "[[@{/users}]]";
  }
</script>
</body>
</html>
